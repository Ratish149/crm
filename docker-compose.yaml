version: "3.9"

services:
  web:
    build: .
    volumes:
      - crm_media_data:/app/media   # Persist media uploads
      - crm_static_data:/app/static # Persist static files
    networks:
      - coolify
    restart: always

networks:
  coolify:
    external: true

volumes:
  crm_media_data:
  crm_static_data:
